<!-- Top application toolbar (header) with Material primary color -->
<mat-toolbar color="primary" class="app-toolbar">
  <!-- Menu button to toggle sidenav visibility -->
  <button mat-icon-button (click)="toggleSidenav()" class="toggle-button">
    <!-- Material icon: hamburger menu -->
    <mat-icon>menu</mat-icon>
  </button>
  <!-- Application title - dynamically updates based on current route -->
  <span class="app-title">{{ pageTitle() }}</span>
</mat-toolbar>

<!-- Main sidenav container that holds sidebar + main content -->
<mat-sidenav-container class="sidenav-container">
  <!-- 
    Sidebar navigation panel
    [opened] = signal controlling open/closed state
    [mode] = 'over' makes sidenav overlay content (better for responsive design)
    #sidenav = template reference for programmatic control
  -->
  <mat-sidenav #sidenav [opened]="sidenavOpen()" [mode]="'over'" class="sidenav">
    <!-- Navigation menu list -->
    <mat-nav-list class="nav-list">
      <!-- Section header -->
      <h2 matSubheader class="nav-header">Navigation</h2>

      <!-- Navigation item: Job Execution Form -->
      <mat-list-item (click)="navigateTo('/trigger')" class="nav-item">
        <!-- Material icon for job execution -->
        <mat-icon matListItemIcon>play_circle_filled</mat-icon>
        <!-- Primary navigation title -->
        <span matListItemTitle>Job Execution Form</span>
        <!-- Secondary description text -->
        <span matListItemLine>Trigger batch jobs manually</span>
      </mat-list-item>

      <!-- Navigation item: Dashboard -->
      <mat-list-item (click)="navigateTo('/dashboard')" class="nav-item">
        <!-- Material icon for dashboard -->
        <mat-icon matListItemIcon>dashboard</mat-icon>
        <!-- Primary navigation title -->
        <span matListItemTitle>Dashboard</span>
        <!-- Secondary description text -->
        <span matListItemLine>View job summary & history</span>
      </mat-list-item>
    </mat-nav-list>
  </mat-sidenav>

  <!-- Main content area where route components are displayed -->
  <mat-sidenav-content class="sidenav-content">
    <!-- Angular router outlet: renders the active route component here -->
    <router-outlet></router-outlet>
  </mat-sidenav-content>
</mat-sidenav-container>
